<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ooda — Design partners</title>
    <meta
      name="description"
      content="We're looking for a small group of design partners to shape ooda before launch."
    />
    <meta property="og:title" content="ooda — Design partners" />
    <meta
      property="og:description"
      content="We're looking for a small group of design partners to shape ooda before launch."
    />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      href="https://cdn.jsdelivr.net/npm/geist@1/dist/fonts/geist-sans/style.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --surface: #ebf1e5;
        --surface-raised: #f4f7f0;
        --surface-dark: #d5e0ca;
        --ink: #272725;
        --ink-muted: #5a5a56;
        --ink-faint: #8a8a84;
        --border: #cdd4c7;
        --accent: #3a6f3a;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      body {
        font-family:
          "Geist Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--surface);
        color: var(--ink);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        line-height: 1.6;
      }
      nav {
        width: 100%;
        max-width: 64rem;
        margin: 0 auto;
        padding: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      nav img {
        height: 1.6rem;
        width: auto;
      }
      nav a.login {
        color: var(--ink-muted);
        text-decoration: none;
        font-size: 0.95rem;
        transition: color 0.15s ease;
      }
      nav a.login:hover {
        color: var(--ink);
      }
      main {
        flex: 1;
        width: 100%;
        max-width: 42rem;
        margin: 0 auto;
        padding: 3rem 1.5rem 4rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .eyebrow {
        font-family: "Caveat", cursive;
        font-size: 1.6rem;
        color: var(--accent);
        margin-bottom: 0.25rem;
      }
      h1 {
        font-size: clamp(2.25rem, 6vw, 3.25rem);
        line-height: 1.05;
        letter-spacing: -0.02em;
        font-weight: 600;
        margin-bottom: 1.5rem;
      }
      .card {
        background: var(--surface-raised);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 1.75rem;
      }
      /* ---- EDIT ME: write the design-partner blurb in here ---- */
      .blurb p {
        color: var(--ink-muted);
        font-size: 1.075rem;
        margin-bottom: 1rem;
      }
      .blurb p:last-child {
        margin-bottom: 0;
      }
      .blurb strong {
        color: var(--ink);
        font-weight: 600;
      }
      .cta {
        margin-top: 2rem;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.75rem 1.25rem;
      }
      a.button {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--ink);
        color: var(--surface);
        text-decoration: none;
        font-weight: 500;
        font-size: 1rem;
        padding: 0.7rem 1.25rem;
        border-radius: 0.6rem;
        transition: opacity 0.15s ease;
      }
      a.button:hover {
        opacity: 0.9;
      }
      .cta span {
        color: var(--ink-faint);
        font-size: 0.95rem;
      }
      footer {
        width: 100%;
        max-width: 64rem;
        margin: 0 auto;
        padding: 2rem 1.5rem;
        color: var(--ink-faint);
        font-size: 0.875rem;
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
      }
      footer a {
        color: var(--ink-faint);
        text-decoration: none;
        transition: color 0.15s ease;
      }
      footer a:hover {
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="https://ooda.run" aria-label="ooda"
        ><img src="/logo.svg" alt="ooda"
      /></a>
      <a class="login" href="https://app.ooda.run">Log in</a>
    </nav>

    <main>
      <p class="eyebrow">Pre-launch</p>
      <h1>Design partners</h1>

      <div class="card">
        <!-- ============================================================
             EDIT ME — replace the placeholder blurb below.
             Keep <p> paragraphs; use <strong> for emphasis.
        ============================================================= -->
        <div class="blurb">
          <p>
            We're opening up a small number of <strong>design partner</strong>
            spots ahead of launch.
          </p>
          <p>
            [ Your blurb goes here — who ooda is for, what design partners get,
            and what you're looking for in return. ]
          </p>
        </div>

        <div class="cta">
          <a class="button" href="mailto:hello@ooda.run?subject=ooda%20design%20partner"
            >Become a design partner</a
          >
          <span>or email hello@ooda.run</span>
        </div>
      </div>
    </main>

    <footer>
      <span>&copy; <span id="year"></span> toy.studio</span>
      <a href="https://ooda.run">ooda.run</a>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
